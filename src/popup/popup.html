<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #333;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    h1::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border-radius: 4px;
    }
    
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-weight: 500;
    }
    
    .status.active {
      background: #d4edda;
      color: #155724;
    }
    
    .status.inactive {
      background: #fff3cd;
      color: #856404;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .site-list {
      list-style: none;
      background: #f8f9fa;
      border-radius: 6px;
      padding: 8px 12px;
    }
    
    .site-list li {
      padding: 4px 0;
      font-size: 13px;
    }
    
    .site-list li::before {
      content: '•';
      color: #e74c3c;
      margin-right: 8px;
    }
    
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Unclickbait</h1>
  
  <div class="status" id="status">Checking...</div>
  
  <div class="section">
    <div class="section-title">Current Site</div>
    <div id="current-site">-</div>
  </div>
  
  <div class="section">
    <div class="section-title">Supported Sites</div>
    <ul class="site-list" id="supported-sites"></ul>
  </div>
  
  <p class="info">
    Hover over replaced links to see the original text.
  </p>
</body>
</html>
